services:
  postgres:
    image: postgis/postgis:16-master
    container_name: PetsRadarDB
    ports:
      - 3254:5432
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - petsradar_data_db:/var/lib/postgresql
    
volumes:
  petsradar_data_db: